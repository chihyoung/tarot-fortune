name: Deploy to GitHub Pages

on:
  push:
    branches: [master]

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Deploy to gh-pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # 배포할 파일을 임시 디렉터리에 복사
          mkdir -p /tmp/deploy
          rsync -a --exclude='.git' --exclude='.github' . /tmp/deploy/

          # gh-pages 브랜치로 전환 (없으면 새로 생성)
          git fetch origin gh-pages 2>/dev/null && git checkout gh-pages || git checkout --orphan gh-pages

          # 기존 파일 제거 후 새 파일로 교체
          git rm -rf . --quiet
          rsync -a /tmp/deploy/ .

          git add -A
          git diff --cached --quiet || git commit -m "deploy: ${{ github.sha }}"
          git push origin gh-pages --force
