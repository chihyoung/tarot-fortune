<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>오늘의 타롯 운세</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Noto+Serif+KR:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#c9a84c;--gold-l:#f0d87a;--gold-d:#7a5e20;
  --pur:#7b2d8b;--pur-l:#a355b8;
  --txt:#f0e6ff;--txt2:#b8a8d0;
  --cw:250px;--ch:426px;
}
body{background:#05000f;color:var(--txt);font-family:'Noto Serif KR',serif;min-height:100vh;overflow-x:hidden}

/* ── stars ── */
#stars{position:fixed;inset:0;pointer-events:none;z-index:0}
.star{position:absolute;background:#fff;border-radius:50%;animation:twinkle var(--d,3s) var(--dl,0s) infinite ease-in-out}
@keyframes twinkle{0%,100%{opacity:.06;transform:scale(1)}50%{opacity:1;transform:scale(1.5)}}

/* ── nebulae ── */
.neb{position:fixed;border-radius:50%;filter:blur(100px);pointer-events:none;z-index:0}
.n1{width:700px;height:700px;background:radial-gradient(circle,rgba(100,30,160,.13) 0%,transparent 70%);top:-200px;left:-200px;animation:ndrift 22s infinite ease-in-out}
.n2{width:600px;height:600px;background:radial-gradient(circle,rgba(20,50,180,.1) 0%,transparent 70%);bottom:-150px;right:-150px;animation:ndrift 28s infinite ease-in-out reverse}
.n3{width:450px;height:450px;background:radial-gradient(circle,rgba(170,40,100,.07) 0%,transparent 70%);top:35%;left:30%;animation:ndrift 19s 6s infinite ease-in-out}
@keyframes ndrift{0%,100%{transform:translate(0,0)}33%{transform:translate(30px,-20px)}66%{transform:translate(-20px,28px)}}

/* ── layout ── */
.wrap{position:relative;z-index:1;max-width:980px;margin:0 auto;padding:44px 20px 70px;text-align:center}

/* ── header ── */
header{margin-bottom:52px}
.tdeco{display:flex;align-items:center;justify-content:center;gap:18px;margin-bottom:14px}
.tline{flex:1;max-width:130px;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent)}
.tsym{color:var(--gold);font-size:20px;animation:spin 14s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}
h1{font-family:'Cinzel',serif;font-size:clamp(28px,5vw,50px);font-weight:700;
   background:linear-gradient(135deg,#7a5a18,var(--gold-l),var(--gold),#7a5a18);
   background-size:250% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;
   background-clip:text;animation:shim 5s linear infinite;letter-spacing:2px;margin-bottom:6px}
@keyframes shim{0%{background-position:0 center}100%{background-position:250% center}}
.sub{font-family:'Cinzel',serif;font-size:11px;color:var(--pur-l);letter-spacing:5px;text-transform:uppercase;margin-bottom:18px}
.date-badge{display:inline-block;padding:6px 22px;border:1px solid rgba(201,168,76,.35);border-radius:24px;font-size:13px;color:var(--gold);letter-spacing:1px}

/* ── instruction ── */
.inst{margin-bottom:44px;font-size:15px;color:var(--txt2);line-height:2}
.inst .hint{font-family:'Cinzel',serif;font-size:10px;color:var(--pur-l);letter-spacing:4px;margin-top:6px}

/* ── grid ── */
.grid{display:flex;justify-content:center;gap:30px;flex-wrap:wrap;margin-bottom:52px;transition:opacity .4s}
.slot{display:flex;flex-direction:column;align-items:center;gap:13px}
.pos-lbl{font-family:'Cinzel',serif;font-size:10px;letter-spacing:4px;color:var(--gold-d);text-transform:uppercase}

/* ── card container ── */
.card{width:var(--cw);height:var(--ch);perspective:1200px;cursor:pointer}
.inner{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform .75s cubic-bezier(.4,.1,.2,1)}
.card.flipped .inner{transform:rotateY(180deg)}
.card:not(.flipped):hover .inner{transform:rotateY(16deg) translateY(-10px) scale(1.04)}

/* ── card faces ── */
.face{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;border-radius:14px;overflow:hidden}

/* back */
.back{border:1px solid rgba(201,168,76,.5);transition:box-shadow .3s}
.card:not(.flipped):hover .back{box-shadow:0 6px 44px rgba(120,40,180,.65),0 -14px 36px rgba(120,40,180,.3)}

/* front */
.front{transform:rotateY(180deg);display:flex;flex-direction:column;border:1px solid rgba(201,168,76,.55);background:#060012}
.card.flipped .front{box-shadow:0 0 36px rgba(201,168,76,.28),0 -12px 28px rgba(201,168,76,.14)}

.art-wrap{flex:0 0 58%;position:relative;overflow:hidden}
.art-wrap svg{width:100%;height:100%;display:block}
.art-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:none;border-radius:13px 13px 0 0}
.back-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:none;border-radius:13px}

.card-info{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:space-between;padding:8px 12px 10px;
  background:linear-gradient(to bottom,rgba(4,0,12,.7) 0%,rgba(4,0,10,.97) 100%)}
.cname-kr{font-family:'Noto Serif KR',serif;font-size:15px;font-weight:600;color:var(--gold-l);line-height:1.2}
.cname-en{font-family:'Cinzel',serif;font-size:8px;color:var(--gold-d);letter-spacing:2px;text-transform:uppercase}
.ckw{font-size:9.5px;color:var(--pur-l);letter-spacing:.5px;text-align:center}
.cdiv{width:90%;height:1px;background:linear-gradient(90deg,transparent,rgba(201,168,76,.4),transparent);margin:3px 0}
.cmsg{font-size:9.5px;color:var(--txt2);line-height:1.7;text-align:center;flex:1;display:flex;align-items:center}
.corient{font-family:'Cinzel',serif;font-size:8px;color:var(--gold-d);letter-spacing:1px}
.corient.rev{color:#c06070}

/* ── summary ── */
.summary{display:none;position:relative;margin-bottom:52px;animation:risein .9s cubic-bezier(.2,.8,.3,1)}
.summary.on{display:block}
@keyframes risein{from{opacity:0;transform:translateY(36px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}

.sum-outer{
  position:relative;
  background:linear-gradient(160deg,rgba(30,4,60,.96) 0%,rgba(8,0,22,.98) 60%,rgba(20,2,40,.96) 100%);
  border:1px solid rgba(201,168,76,.4);
  border-radius:20px;
  padding:48px 52px 44px;
  overflow:hidden;
}
.sum-outer::before{
  content:'';position:absolute;inset:0;border-radius:20px;
  background:radial-gradient(ellipse 70% 60% at 50% 0%,rgba(201,168,76,.10) 0%,transparent 70%);
  pointer-events:none;
}
.sum-outer::after{
  content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);
  width:70%;height:1px;
  background:linear-gradient(90deg,transparent,rgba(201,168,76,.7),transparent);
}
.sum-corner{position:absolute;width:22px;height:22px;border-color:rgba(201,168,76,.55);border-style:solid}
.sum-corner.tl{top:14px;left:14px;border-width:1px 0 0 1px}
.sum-corner.tr{top:14px;right:14px;border-width:1px 1px 0 0}
.sum-corner.bl{bottom:14px;left:14px;border-width:0 0 1px 1px}
.sum-corner.br{bottom:14px;right:14px;border-width:0 1px 1px 0}

.sum-eyebrow{font-family:'Cinzel',serif;font-size:9px;letter-spacing:6px;color:rgba(201,168,76,.55);text-transform:uppercase;margin-bottom:18px}
.sum-title{
  font-family:'Cinzel',serif;font-size:clamp(18px,3vw,26px);font-weight:700;letter-spacing:2px;
  background:linear-gradient(135deg,#8a6820,var(--gold-l),#ffe89a,var(--gold),#8a6820);
  background-size:300% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;animation:shim 6s linear infinite;
  margin-bottom:22px;line-height:1.4;
}
.sum-divider{display:flex;align-items:center;gap:14px;margin:0 auto 26px;max-width:380px}
.sum-divider span{flex:1;height:1px;background:linear-gradient(90deg,transparent,rgba(201,168,76,.45),transparent)}
.sum-divider i{color:var(--gold);font-style:normal;font-size:13px;opacity:.8}
.sum-text{font-size:clamp(14px,2vw,17px);color:#ddd0f5;line-height:2.2;font-weight:300;letter-spacing:.3px}
.sum-glow{
  position:absolute;bottom:-60px;left:50%;transform:translateX(-50%);
  width:300px;height:120px;
  background:radial-gradient(ellipse,rgba(123,45,139,.22) 0%,transparent 70%);
  pointer-events:none;
}

/* ── button ── */
.btn{background:transparent;border:1px solid rgba(201,168,76,.45);color:var(--gold);
  font-family:'Cinzel',serif;font-size:12px;letter-spacing:4px;padding:15px 48px;
  cursor:pointer;border-radius:32px;text-transform:uppercase;transition:all .3s;position:relative;overflow:hidden}
.btn::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(201,168,76,.08),rgba(120,40,160,.08));opacity:0;transition:opacity .3s}
.btn:hover{border-color:var(--gold);box-shadow:0 0 26px rgba(201,168,76,.32);transform:translateY(-3px)}
.btn:hover::before{opacity:1}
.btn:active{transform:translateY(-1px)}

footer{margin-top:56px;font-family:'Cinzel',serif;font-size:10px;color:rgba(184,168,208,.22);letter-spacing:2px}

/* ── ad modal ── */
.ad-modal{
  display:none;position:fixed;inset:0;z-index:999;
  background:rgba(2,0,10,.82);backdrop-filter:blur(8px);
  align-items:center;justify-content:center;
}
.ad-modal.on{display:flex;animation:fadein .4s ease}
@keyframes fadein{from{opacity:0}to{opacity:1}}
.ad-box{
  position:relative;width:360px;max-width:94vw;
  background:linear-gradient(160deg,rgba(22,4,46,.98),rgba(8,0,20,.99));
  border:1px solid rgba(201,168,76,.45);border-radius:20px;
  padding:36px 28px 30px;text-align:center;
}
.ad-box::before{
  content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);
  width:60%;height:1px;
  background:linear-gradient(90deg,transparent,rgba(201,168,76,.6),transparent);
}
.ad-label{font-family:'Cinzel',serif;font-size:9px;letter-spacing:5px;color:rgba(201,168,76,.45);text-transform:uppercase;margin-bottom:18px}
.ad-slot{
  min-height:100px;background:rgba(255,255,255,.03);border:1px dashed rgba(201,168,76,.2);
  border-radius:10px;margin-bottom:22px;display:flex;align-items:center;justify-content:center;
  overflow:hidden;
}
.ad-slot-hint{font-size:11px;color:rgba(184,168,208,.3);font-family:'Cinzel',serif;letter-spacing:2px}
.ad-countdown{font-family:'Cinzel',serif;font-size:13px;color:var(--txt2);margin-bottom:18px;letter-spacing:1px}
.ad-countdown b{color:var(--gold);font-size:18px}
.ad-skip{
  background:transparent;border:1px solid rgba(201,168,76,.5);color:var(--gold);
  font-family:'Cinzel',serif;font-size:11px;letter-spacing:3px;padding:12px 36px;
  cursor:pointer;border-radius:28px;text-transform:uppercase;transition:all .3s;
  opacity:.4;pointer-events:none;
}
.ad-skip.ready{opacity:1;pointer-events:auto}
.ad-skip.ready:hover{background:rgba(201,168,76,.1);box-shadow:0 0 20px rgba(201,168,76,.28);transform:translateY(-2px)}

/* ── responsive ── */
@media(max-width:860px){
  :root{--cw:200px;--ch:341px}
  .grid{gap:18px}
}
@media(max-width:680px){
  :root{--cw:168px;--ch:286px}
  .grid{gap:12px}
}
@media(max-width:450px){
  :root{--cw:140px;--ch:238px}
}
</style>
</head>
<body>
<div id="stars"></div>
<div class="neb n1"></div><div class="neb n2"></div><div class="neb n3"></div>

<div class="wrap">
  <header>
    <div class="tdeco">
      <div class="tline"></div><span class="tsym">✦</span><div class="tline"></div>
    </div>
    <h1>오늘의 타롯 운세</h1>
    <p class="sub">Daily Tarot Reading</p>
    <div class="date-badge" id="dateBadge"></div>
  </header>

  <p class="inst">
    세 장의 카드가 당신을 기다립니다<br>
    각 카드를 클릭하여 오늘의 운명을 확인하세요
    <br><span class="hint">✦ &nbsp; Past &nbsp;·&nbsp; Present &nbsp;·&nbsp; Future &nbsp; ✦</span>
  </p>

  <div class="grid" id="grid"></div>

  <div class="summary" id="summary">
    <div class="sum-outer">
      <div class="sum-corner tl"></div><div class="sum-corner tr"></div>
      <div class="sum-corner bl"></div><div class="sum-corner br"></div>
      <div class="sum-eyebrow">✦ &nbsp; Today's Oracle &nbsp; ✦</div>
      <div class="sum-title" id="sumTitle">오늘의 별이 전하는 말</div>
      <div class="sum-divider"><span></span><i>✦</i><span></span></div>
      <p class="sum-text" id="sumText"></p>
      <div class="sum-glow"></div>
    </div>
  </div>

  <!-- 광고 모달 -->
  <div class="ad-modal" id="adModal">
    <div class="ad-box">
      <div class="ad-label">잠시 후 오늘의 운세가 공개됩니다</div>
      <!-- ▼ 카카오 애드핏: data-ad-unit 값을 발급받은 ID로 교체하세요 -->
      <div class="ad-slot">
        <ins class="kakao_ad_area" style="display:none;"
          data-ad-unit="DAN-XXXXXXXXXX"
          data-ad-width="320"
          data-ad-height="100"></ins>
        <span class="ad-slot-hint" id="adHint">AD</span>
      </div>
      <!-- ▲ 애드핏 스크립트는 </body> 직전에 한 번만 삽입됩니다 -->
      <div class="ad-countdown"><b id="adCount">5</b> 초 후 운세 공개</div>
      <button class="ad-skip" id="adSkip" onclick="closeAd()">✦ &nbsp; 운세 보기 &nbsp; ✦</button>
    </div>
  </div>

  <button class="btn" onclick="shuffle()">✦ &nbsp; 카드 다시 뽑기 &nbsp; ✦</button>

  <footer>
    <p>The stars have spoken · 별이 속삭인 것을 카드가 전합니다</p>
    <p id="imgGuide" style="margin-top:14px;font-size:9px;color:rgba(184,168,208,.18);letter-spacing:1px;line-height:2"></p>
  </footer>
</div>

// ═══ SVG HELPERS ═══
function rays(cx,cy,r1,r2,n,stroke,sw,op){
  return Array.from({length:n},(_,i)=>{
    const a=(i*360/n-90)*Math.PI/180;
    return `<line x1="${(cx+r1*Math.cos(a)).toFixed(1)}" y1="${(cy+r1*Math.sin(a)).toFixed(1)}" x2="${(cx+r2*Math.cos(a)).toFixed(1)}" y2="${(cy+r2*Math.sin(a)).toFixed(1)}" stroke="${stroke}" stroke-width="${sw}" opacity="${op}"/>`;
  }).join('');
}
function starPoly(cx,cy,r1,r2,n,fill,stroke,sw){
  const pts=Array.from({length:n*2},(_,i)=>{
    const r=i%2===0?r1:r2, a=(i*180/n-90)*Math.PI/180;
    return `${(cx+r*Math.cos(a)).toFixed(1)},${(cy+r*Math.sin(a)).toFixed(1)}`;
  }).join(' ');
  return `<polygon points="${pts}" fill="${fill}" stroke="${stroke}" stroke-width="${sw}"/>`;
}
function glow(id,dev){return `<filter id="${id}"><feGaussianBlur stdDeviation="${dev}" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>`;}

  <text x="105" y="320" text-anchor="middle" font-size="7.5" fill="#7b2d8b" fill-opacity=".55" font-family="Cinzel,serif" letter-spacing="3">오늘의 운세</text>
  <!-- decorative dots top/bottom -->
  <g fill="#c9a84c" opacity=".35">
    <circle cx="105" cy="35" r="1.8"/>
    <circle cx="85" cy="35" r="1.2"/><circle cx="125" cy="35" r="1.2"/>
    <circle cx="105" cy="332" r="1.8"/>
    <circle cx="85" cy="332" r="1.2"/><circle cx="125" cy="332" r="1.2"/>
  </g>
  <!-- star field -->
  <g fill="#fff">
    ${Array.from({length:30},(_,i)=>{const x=15+i*6.5+Math.sin(i*1.7)*8,y=60+Math.cos(i*2.3)*10+(i%3)*90;return `<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="${(Math.sin(i+1)*.6+.7).toFixed(1)}" opacity="${(.2+Math.abs(Math.sin(i*.7))*.5).toFixed(2)}"/>`;}).join('')}
  </g>
  </svg>`;
}

// ═══ CARD BORDER OVERLAY (gold frame on top of card face) ═══

      <path d="M192,18 L180,18 L180,22 M192,18 L192,30 L188,30"/>

// ═══ STARS ═══
function mkStars(){
  const c=document.getElementById('stars');
  for(let i=0;i<160;i++){
    const s=document.createElement('div');
    s.className='star';
    const sz=Math.random()*2.5+.4;
    s.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;--d:${(Math.random()*4+2).toFixed(1)}s;--dl:${(Math.random()*7).toFixed(1)}s`;
    c.appendChild(s);
  }
}

// ═══ STATE ═══
const POS=['과거','현재','미래'];
let drawn=[],flipped=0;

function draw(){
  const idxs=Array.from({length:T.length},(_,i)=>i).sort(()=>Math.random()-.5);
  drawn=idxs.slice(0,3).map(ai=>({...T[ai],artIdx:ai,rev:Math.random()<.28}));
  flipped=0;
}

// ═══ RENDER ═══
function render(){
  const g=document.getElementById('grid');
  g.innerHTML='';
  drawn.forEach((c,i)=>{
    const slot=document.createElement('div');slot.className='slot';
    const lbl=document.createElement('div');lbl.className='pos-lbl';lbl.textContent=`✦ ${POS[i]} ✦`;
    const card=document.createElement('div');card.className='card';card.id=`cd${i}`;
    card.addEventListener('click',()=>flip(i));
    const inner=document.createElement('div');inner.className='inner';

    // back
    const back=document.createElement('div');back.className='face back';
    back.innerHTML=backSVG();

    // front
    const front=document.createElement('div');front.className='face front';
    front.innerHTML=`
      <div class="art-wrap">${cardArt(c.artIdx)}</div>
      <div class="card-info">
        <div>
          <div class="cname-kr">${c.kr}</div>
          <div class="cname-en">${c.en}</div>
        </div>
        <div class="cdiv"></div>
        <div class="ckw">${c.kw}</div>
        <div class="cdiv"></div>
        <div class="cmsg">${c.rev?c.rv:c.up}</div>
        <div class="corient${c.rev?' rev':''}">
          ${c.rev?'▽ 역방향':'△ 정방향'}
        </div>
      </div>`;

    // ── 카드 앞면 이미지 로드 (images/{file}.jpg/png/jpeg/webp 순 시도) ──
    const aw = front.querySelector('.art-wrap');
    const artSvg = aw.querySelector('svg');
    const artImg = document.createElement('img');
    artImg.className = 'art-img';
    artImg.alt = c.kr;
    loadImg(artImg, c.file, () => {
      artImg.style.display = 'block';
      if(artSvg) artSvg.style.display = 'none';
    });
    aw.appendChild(artImg);

    // ── 카드 뒷면 이미지 로드 (images/back.jpg/png/jpeg/webp 순 시도) ──
    const backSvgEl = back.querySelector('svg');
    const backImg = document.createElement('img');
    backImg.className = 'back-img';
    backImg.alt = 'card back';
    loadImg(backImg, 'back', () => {
      backImg.style.display = 'block';
      if(backSvgEl) backSvgEl.style.display = 'none';
    });
    back.appendChild(backImg);

    inner.appendChild(back);inner.appendChild(front);
    card.appendChild(inner);
    slot.appendChild(lbl);slot.appendChild(card);
    g.appendChild(slot);
  });
  document.getElementById('summary').classList.remove('on');
}

function flip(i){
  const el=document.getElementById(`cd${i}`);
  if(!el||el.classList.contains('flipped'))return;
  el.classList.add('flipped');
  if(++flipped===3)setTimeout(showAdModal,900);
}

function showSum(){
  const titles = [
    `${drawn[0].kr} · ${drawn[1].kr} · ${drawn[2].kr}`,
    `${drawn[1].kr}의 시간이 찾아왔습니다`,
    `${drawn[2].kr}으로 향하는 여정`,
    `${drawn[0].kr}에서 ${drawn[2].kr}으로`,
  ];
  document.getElementById('sumTitle').textContent = titles[Math.floor(Math.random()*titles.length)];
  document.getElementById('sumText').textContent=SUMS[Math.floor(Math.random()*SUMS.length)];
  document.getElementById('summary').classList.add('on');
  document.getElementById('summary').scrollIntoView({behavior:'smooth',block:'center'});
}

let _adTimer = null;
function showAdModal(){
  const modal = document.getElementById('adModal');
  const countEl = document.getElementById('adCount');
  const skipBtn = document.getElementById('adSkip');
  modal.classList.add('on');
  skipBtn.classList.remove('ready');
  let sec = 5;
  countEl.textContent = sec;
  _adTimer = setInterval(()=>{
    sec--;
    countEl.textContent = sec;
    if(sec <= 0){
      clearInterval(_adTimer);
      skipBtn.classList.add('ready');
      document.getElementById('adCount').closest('.ad-countdown').textContent = '운세를 확인할 준비가 됐어요';
    }
  }, 1000);
}

function closeAd(){
  clearInterval(_adTimer);
  document.getElementById('adModal').classList.remove('on');
  showSum();
}

function shuffle(){
  const g=document.getElementById('grid');
  g.style.opacity='0';
  setTimeout(()=>{draw();render();g.style.opacity='1';},420);
}

// ═══ DATE ═══
document.getElementById('dateBadge').textContent=new Date().toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric',weekday:'long'});

// ═══ IMAGE LOADER ═══
// 파일명 규칙: {번호}_{영문명}.{확장자} (예: 19_the_sun.jpg)
function loadImg(imgEl, name, onSuccess) {
  const exts = ['jpg','jpeg','png','webp'];
  let i = 0;
  function tryNext() {
    if (i >= exts.length) return;
    imgEl.onload  = onSuccess;
    imgEl.onerror = () => { i++; tryNext(); };
    imgEl.src = `./images/${name}.${exts[i]}`;
    i++;
  }
  tryNext();
}

// ═══ IMAGE GUIDE ═══
(function(){
  const guide = document.getElementById('imgGuide');
  if(guide){
    const fileList = T.map(c=>`<span style="white-space:nowrap">${c.file}</span>`).join(' · ');
    guide.innerHTML =
      '📁 카드 이미지 사용법: index.html 옆에 <b style="color:rgba(201,168,76,.4)">images/</b> 폴더를 만들고<br>' +
      '파일명을 <b style="color:rgba(201,168,76,.4)">번호_영문명.jpg</b> 형식으로 저장하세요. (예: <b style="color:rgba(201,168,76,.4)">19_the_sun.jpg</b>)<br>' +
      '뒷면은 <b style="color:rgba(201,168,76,.4)">back.jpg</b> 로 저장하면 자동 적용됩니다.<br>' +
      '<span style="font-size:8px;opacity:.7">' + fileList + '</span>';
  }
})();

// ═══ INIT ═══
mkStars();draw();render();
</script>
